name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm audit signatures

      - run: npm audit --omit=dev

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - run: npm run build
